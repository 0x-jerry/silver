name: Test

on:
  push:
    branches:
      - main

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup bun
        uses: 0x-jerry/workflows/actions/setup-js@main

      - name: Install dependencies
        run: bun install

      - run: bun run test:coverage
